<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SE-AM Enablers Dashboard — FY2569</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Sarabun','Segoe UI',sans-serif;font-size:15px;background:#F0F4F8;color:#1E293B;}
.page-hd{background:#1c2b3a;color:#e8e4d8;padding:10px 20px;display:flex;align-items:center;gap:10px;}
.page-hd h1{font-size:14px;font-weight:600;}
.page-hd .sub{font-size:11px;color:#8fa3b3;margin-left:auto;}
.wrap{max-width:1080px;margin:0 auto;padding:20px 16px;}
.overall-row{display:grid;grid-template-columns:220px 1fr;gap:14px;margin-bottom:20px;align-items:stretch;}
.overall-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 20px;}
.overall-label{font-size:11px;color:#94a3b8;margin-bottom:4px;}
.overall-score{font-size:38px;font-weight:700;color:#1c2b3a;line-height:1;}
.overall-unit{font-size:13px;font-weight:400;color:#94a3b8;margin-left:3px;}
.overall-note{font-size:11px;color:#64748b;margin-top:6px;}
.summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.s-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 16px;}
.s-label{font-size:11px;color:#94a3b8;margin-bottom:3px;}
.s-num{font-size:24px;font-weight:700;}
.s-total{color:#1c2b3a;} .s-done{color:#0F6E56;} .s-wip{color:#854F0B;} .s-todo{color:#94a3b8;}
.divider{border:none;border-top:1px solid #e2e8f0;margin:16px 0 12px;}
.map-link{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 16px;font-size:12px;color:#334155;text-decoration:none;margin-bottom:14px;transition:all .15s;}
.map-link:hover{background:#f8fafc;border-color:#94a3b8;}
.legend{font-size:10px;color:#94a3b8;display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.ld{width:12px;height:12px;border-radius:3px;display:inline-block;}
.d-g2{background:#10b981;} .d-g1{background:#6ee7b7;} .d-a{background:#fbbf24;} .d-r{background:#f87171;} .d-x{background:#e2e8f0;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px;}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:9px;text-decoration:none;color:inherit;transition:all .18s;}
.card:hover{border-color:#94a3b8;box-shadow:0 2px 12px rgba(0,0,0,.07);transform:translateY(-1px);}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.code{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#e0f0ff;color:#0c447c;}
.wt{font-size:10px;padding:2px 7px;border-radius:20px;background:#f1f5f9;color:#64748b;}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;margin-left:auto;}
.done{background:#d1fae5;color:#065f46;} .wip{background:#fef3c7;color:#92400e;} .todo{background:#f1f5f9;color:#94a3b8;}
.name-th{font-size:13px;font-weight:600;color:#1c2b3a;line-height:1.3;}
.name-en{font-size:10px;color:#94a3b8;}
.score-row{display:flex;align-items:baseline;gap:5px;}
.score-num{font-size:22px;font-weight:700;color:#1c2b3a;}
.score-na{font-size:20px;color:#cbd5e1;}
.score-unit{font-size:11px;color:#94a3b8;}
.yoy{font-size:11px;display:flex;align-items:center;gap:3px;}
.yoy-up{color:#10b981;} .yoy-dn{color:#ef4444;} .yoy-na{color:#cbd5e1;}
.dots{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;}
.dot{width:17px;height:17px;border-radius:4px;}
.footer{margin-top:auto;padding-top:8px;border-top:1px solid #f1f5f9;font-size:11px;color:#94a3b8;display:flex;align-items:center;gap:4px;}
</style>
</head>
<body>
<div class="page-hd">
  <h1>⚙ SE-AM Enablers Dashboard — FY2569</h1>
  <span class="sub">การท่าเรือแห่งประเทศไทย · อัปเดต มิ.ย. 2569</span>
</div>

<div class="wrap">
  <div class="overall-row">
    <div class="overall-card">
      <div class="overall-label">คะแนนรวม (Weighted Avg)</div>
      <div class="overall-score" id="wscore">—<span class="overall-unit">/ 5.00</span></div>
      <div class="overall-note" id="wnote">—</div>
    </div>
    <div class="summary-bar">
      <div class="s-card"><div class="s-label">ด้านทั้งหมด</div><div class="s-num s-total">10</div></div>
      <div class="s-card"><div class="s-label">เสร็จแล้ว</div><div class="s-num s-done" id="n-done">—</div></div>
      <div class="s-card"><div class="s-label">กำลังทำ</div><div class="s-num s-wip" id="n-wip">—</div></div>
      <div class="s-card"><div class="s-label">ยังไม่เริ่ม</div><div class="s-num s-todo" id="n-todo">—</div></div>
    </div>
  </div>

  <hr class="divider">
  <a class="map-link" href="https://pdee-hub.github.io/Enablers-Link-Document-69/" target="_blank">
    🔗 Enablers Linkage Map — ดูแผนที่ความเชื่อมโยงหลักฐานข้ามด้าน ↗
  </a>

  <div class="legend">
    <span>ระดับคะแนนรายข้อ:</span>
    <span><span class="ld d-g2"></span> ≥ 4.00</span>
    <span><span class="ld d-g1"></span> 3.00–3.99</span>
    <span><span class="ld d-a"></span> 2.00–2.99</span>
    <span><span class="ld d-r"></span> &lt; 2.00</span>
    <span><span class="ld d-x" style="border:1px solid #e2e8f0;"></span> รอข้อมูล</span>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const DIMS = [
  {key:"sm", id:"4.1",nameTh:"การมุ่งเน้นผู้มีส่วนได้ส่วนเสีย",nameEn:"Stakeholder Management",
   file:"sm.html",weight:15,orig:3.08,score:null,status:"wip",
   dots:["d-g1","d-a","d-a","d-x","d-r","d-a","d-g1","d-a","d-a"]},
  {key:"cm", id:"4.2",nameTh:"การมุ่งเน้นลูกค้า",nameEn:"Customer Management",
   file:"cm.html",weight:10,orig:3.42,score:null,status:"done",
   dots:["d-g1","d-g1","d-g1","d-g1","d-g1","d-g1","d-g1"]},
  {key:"sp", id:"2",  nameTh:"การวางแผนยุทธศาสตร์",nameEn:"Strategic Planning",
   file:"sp.html",weight:15,orig:2.54,score:null,status:"wip",
   dots:["d-g1","d-g1","d-g1","d-a","d-r","d-a","d-a","d-a","d-a","d-a"]},
  {key:"hcm",id:"6",  nameTh:"การบริหารทุนมนุษย์",nameEn:"Human Capital Management",
   file:"hcm.html",weight:15,orig:3.07,score:null,status:"done",
   dots:["d-g1","d-g1","d-a","d-g1","d-a","d-a","d-g1","d-g1","d-a","d-g1"]},
  {key:"km", id:"7.1",nameTh:"การจัดการความรู้",nameEn:"Knowledge Management",
   file:"km.html",weight:8,orig:null,score:null,status:"todo",dots:[]},
  {key:"im", id:"7.2",nameTh:"การจัดการนวัตกรรม",nameEn:"Innovation Management",
   file:"im.html",weight:8,orig:1.99,score:null,status:"wip",
   dots:["d-a","d-a","d-a","d-a","d-r","d-r","d-a","d-a","d-a","d-a","d-a","d-a"]},
  {key:"ia", id:"8",  nameTh:"การตรวจสอบภายใน",nameEn:"Internal Audit",
   file:"ia.html",weight:10,orig:2.76,score:null,status:"wip",
   dots:["d-a","d-g1","d-g1","d-g1","d-g2","d-g1","d-a","d-g1","d-a","d-a","d-a","d-a","d-r","d-g2"]},
  {key:"cg", id:"9",  nameTh:"การกำกับดูแลกิจการ",nameEn:"Corporate Governance",
   file:"cg.html",weight:7,orig:null,score:null,status:"todo",dots:[]},
  {key:"rm", id:"10", nameTh:"บริหารความเสี่ยง & ควบคุมภายใน",nameEn:"Risk Management & IC",
   file:"rm.html",weight:5,orig:null,score:null,status:"todo",dots:[]},
  {key:"dt", id:"11", nameTh:"การเปลี่ยนผ่านดิจิทัล",nameEn:"Digital Transformation",
   file:"dt.html",weight:7,orig:null,score:null,status:"todo",dots:[]}
];
const SL = {done:"เสร็จแล้ว",wip:"กำลังทำ",todo:"ยังไม่เริ่ม"};
function f2(n){return n?n.toFixed(2):"—";}
function dotHtml(dots){
  return dots.length?dots.map(d=>'<div class="dot '+d+'"></div>').join(''):
    Array(5).fill('<div class="dot d-x"></div>').join('');
}
let done=0,wip=0,todo=0,ws=0,wt=0;
const grid=document.getElementById('grid');
DIMS.forEach(d=>{
  if(d.status==='done')done++; else if(d.status==='wip')wip++; else todo++;
  const sc=d.score||d.orig;
  if(sc){ws+=sc*d.weight;wt+=d.weight;}
  const dy=sc&&d.orig?(sc-d.orig):null;
  const yoy=dy!==null?(dy>=0?'<span class="yoy-up">▲ '+Math.abs(dy).toFixed(2)+' จากปีก่อน</span>':'<span class="yoy-dn">▼ '+Math.abs(dy).toFixed(2)+' จากปีก่อน</span>'):'<span class="yoy-na">รอข้อมูล</span>';
  const scoreHtml=sc?'<span class="score-num">'+f2(sc)+'</span><span class="score-unit">คะแนน</span>':'<span class="score-na">—</span>';
  const a=document.createElement('a');
  a.className='card'; a.href=d.file;
  a.innerHTML='<div class="card-top"><span class="code">'+d.key.toUpperCase()+'</span><span class="wt">'+d.weight+'%</span><span class="badge '+d.status+'">'+SL[d.status]+'</span></div>'+
    '<div><div class="name-th">'+d.nameTh+'</div><div class="name-en">'+d.nameEn+'</div></div>'+
    '<div class="score-row">'+scoreHtml+'</div>'+
    '<div class="yoy">'+yoy+'</div>'+
    '<div><div style="font-size:10px;color:#94a3b8;margin-bottom:3px;">สถานะรายข้อ</div><div class="dots">'+dotHtml(d.dots)+'</div></div>'+
    '<div class="footer">→ เปิดด้าน '+d.key.toUpperCase()+'</div>';
  grid.appendChild(a);
});
document.getElementById('n-done').textContent=done;
document.getElementById('n-wip').textContent=wip;
document.getElementById('n-todo').textContent=todo;
if(wt>0){
  const avg=ws/wt;
  document.getElementById('wscore').innerHTML=avg.toFixed(2)+'<span class="overall-unit">/ 5.00</span>';
  document.getElementById('wnote').textContent='ถ่วงน้ำหนักจาก '+wt+'% ของด้านที่มีข้อมูล';
}
</script>
</body>
</html>
